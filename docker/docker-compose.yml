services:
  postgres:
    image: postgres:15
    container_name: taxi_postgres
    environment:
      POSTGRES_USER: taxi_user
      POSTGRES_PASSWORD: taxi_pass
      POSTGRES_DB: taxi_db
    ports:
      - "5433:5432"
    volumes:
      - taxi_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi_user -d taxi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  taxi_pgdata:
