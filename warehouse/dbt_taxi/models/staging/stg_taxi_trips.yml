version: 2

models:
  - name: stg_taxi_trips
    description: "Cleaned/typed taxi trips staged from raw.taxi_trips."
    columns:
      - name: pickup_ts
        tests:
          - not_null
      - name: dropoff_ts
        tests:
          - not_null
      - name: pickup_location_id
        tests:
          - not_null
      - name: dropoff_location_id
        tests:
          - not_null
      - name: trip_distance
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
